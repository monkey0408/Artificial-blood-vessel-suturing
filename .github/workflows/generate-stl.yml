name: Generate STL and Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag'
        required: false
        default: 'v1.0'
      fn:
        description: 'OpenSCAD $fn (surface smoothness)'
        required: false
        default: '128'
  push:
    branches:
      - main

jobs:
  build-and-package:
    runs-on: ubuntu-latest
    outputs:
      zip_exists: ${{ steps.check_zip.outputs.exists }}
      mandrels_exists: ${{ steps.check_mandrels.outputs.exists }}
      half_exists: ${{ steps.check_half.outputs.exists }}
      needle_exists: ${{ steps.check_needle.outputs.exists }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y openscad zip

      - name: Create STL output directory
        run: mkdir -p openscad/STL

      - name: Render mandrels.scad -> mandrels.stl
        run: |
          if [ -f openscad/mandrels.scad ]; then
            openscad -o openscad/STL/mandrels.stl -D "\$fn=${{ github.event.inputs.fn }}" openscad/mandrels.scad
          else
            echo "openscad/mandrels.scad not found, skipping"
          fi

      - name: Render half_clamp.scad -> half_clamp.stl
        run: |
          if [ -f openscad/half_clamp.scad ]; then
            openscad -o openscad/STL/half_clamp.stl -D "\$fn=${{ github.event.inputs.fn }}" openscad/half_clamp.scad
          else
            echo "openscad/half_clamp.scad not found, skipping"
          fi

      - name: Render needle_clamp.scad -> needle_clamp.stl
        run: |
          if [ -f openscad/needle_clamp.scad ]; then
            openscad -o openscad/STL/needle_clamp.stl -D "\$fn=${{ github.event.inputs.fn }}" openscad/needle_clamp.scad
          else
            echo "openscad/needle_clamp.scad not found, skipping"
          fi

      - name: List generated STLs
        run: ls -l openscad/STL || true

      - name: Package sources and STLs
        run: |
          zip -r openscad_sources.zip openscad || true

      - name: Check openscad_sources.zip exists
        id: check_zip
        run: |
          if [ -f openscad_sources.zip ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Check mandrels.stl exists
        id: check_mandrels
        run: |
          if [ -f openscad/STL/mandrels.stl ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Check half_clamp.stl exists
        id: check_half
        run: |
          if [ -f openscad/STL/half_clamp.stl ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Check needle_clamp.stl exists
        id: check_needle
        run: |
          if [ -f openscad/STL/needle_clamp.stl ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Upload as artifact (always available for downloads)
        uses: actions/upload-artifact@v4
        with:
          name: openscad-artifacts
          path: |
            openscad_sources.zip
            openscad/STL/*.stl

  create-release-and-upload:
    needs: build-and-package
    runs-on: ubuntu-latest
    # 把凭证放在 job 级别，保证下面所有 steps 都能使用相同的 token
    env:
      GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: openscad-artifacts
          path: .    # 解压到当前目录，确保 openscad_sources.zip 与 openscad/STL/*.stl 可用

      # （可选）诊断 token 是否有效：
      # - 若想临时启用，把下面两行去掉注释并运行一次，查看返回状态与内容。
      # - 请注意不要在公开日志中泄露完整 token。
      # - name: Diagnostic: test token
      #   run: |
      #     http_code=$(curl -s -o /tmp/resp -w "%{http_code}" -H "Authorization: token $GITHUB_TOKEN" https://api.github.com/user)
      #     echo "HTTP_CODE=$http_code"
      #     cat /tmp/resp

      # 仅在手动触发时才创建 Release（避免 fork/PR 权限限制）
      - name: Create GitHub release (manual-run only)
        id: create_release
        if: ${{ github.event_name == 'workflow_dispatch' }}
        uses: actions/create-release@v1
        with:
          tag_name: ${{ github.event.inputs.tag }}
          release_name: ${{ github.event.inputs.tag }}
          body: |
            Initial STL + OpenSCAD sources for mandrels, clamps, and needle clamp (generated by workflow).
          draft: false
          prerelease: false

      - name: Upload openscad_sources.zip to Release
        if: ${{ github.event_name == 'workflow_dispatch' && steps.create_release.outcome == 'success' && needs.build-and-package.outputs.zip_exists == 'true' }}
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: openscad_sources.zip
          asset_name: openscad_sources.zip
          asset_content_type: application/zip

      - name: Upload mandrels.stl to Release
        if: ${{ github.event_name == 'workflow_dispatch' && steps.create_release.outcome == 'success' && needs.build-and-package.outputs.mandrels_exists == 'true' }}
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: openscad/STL/mandrels.stl
          asset_name: mandrels.stl
          asset_content_type: application/octet-stream

      - name: Upload half_clamp.stl to Release
        if: ${{ github.event_name == 'workflow_dispatch' && steps.create_release.outcome == 'success' && needs.build-and-package.outputs.half_exists == 'true' }}
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: openscad/STL/half_clamp.stl
          asset_name: half_clamp.stl
          asset_content_type: application/octet-stream

      - name: Upload needle_clamp.stl to Release
        if: ${{ github.event_name == 'workflow_dispatch' && steps.create_release.outcome == 'success' && needs.build-and-package.outputs.needle_exists == 'true' }}
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: openscad/STL/needle_clamp.stl
          asset_name: needle_clamp.stl
          asset_content_type: application/octet-stream

      - name: Output release URL
        if: ${{ github.event_name == 'workflow_dispatch' && steps.create_release.outcome == 'success' }}
        run: |
          echo "Release created: https://github.com/${{ github.repository }}/releases/tag/${{ github.event.inputs.tag }}"
