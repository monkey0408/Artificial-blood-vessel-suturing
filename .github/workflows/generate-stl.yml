name: Generate STL and Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag'
        required: false
        default: 'v1.0'
      fn:
        description: 'OpenSCAD $fn (surface smoothness)'
        required: false
        default: '128'
  push:
    branches:
      - main

jobs:
  build-and-package:
    runs-on: ubuntu-latest
    outputs:
      created_release: ${{ steps.create_release_outcome.outcome || 'none' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y openscad zip

      - name: Create STL output directory
        run: mkdir -p openscad/STL

      - name: Render mandrels.scad -> mandrels.stl
        run: |
          if [ -f openscad/mandrels.scad ]; then
            openscad -o openscad/STL/mandrels.stl -D "\$fn=${{ github.event.inputs.fn }}" openscad/mandrels.scad
          else
            echo "openscad/mandrels.scad not found, skipping"
          fi

      - name: Render half_clamp.scad -> half_clamp.stl
        run: |
          if [ -f openscad/half_clamp.scad ]; then
            openscad -o openscad/STL/half_clamp.stl -D "\$fn=${{ github.event.inputs.fn }}" openscad/half_clamp.scad
          else
            echo "openscad/half_clamp.scad not found, skipping"
          fi

      - name: Render needle_clamp.scad -> needle_clamp.stl
        run: |
          if [ -f openscad/needle_clamp.scad ]; then
            openscad -o openscad/STL/needle_clamp.stl -D "\$fn=${{ github.event.inputs.fn }}" openscad/needle_clamp.scad
          else
            echo "openscad/needle_clamp.scad not found, skipping"
          fi

      - name: List generated STLs
        run: ls -l openscad/STL || true

      - name: Package sources and STLs
        run: |
          zip -r openscad_sources.zip openscad || true

      - name: Upload as artifact (always available for downloads)
        uses: actions/upload-artifact@v4
        with:
          name: openscad-artifacts
          path: |
            openscad_sources.zip
            openscad/STL/*.stl

  create-release-and-upload:
    needs: build-and-package
    runs-on: ubuntu-latest
    steps:
      - name: Skip release when not manually triggered
        id: check_dispatch
        run: |
          echo "event_name=${GITHUB_EVENT_NAME}" >> $GITHUB_OUTPUT
      # IMPORTANT: Only create a GitHub Release when this workflow is manually triggered.
      # This prevents fork PRs (which have restricted tokens) from trying to create a release.
      - name: Create GitHub release (manual-run only)
        id: create_release
        if: ${{ github.event_name == 'workflow_dispatch' }}
        uses: actions/create-release@v1
        # OPTIONAL: If you want to use a Personal Access Token (PAT) instead of GITHUB_TOKEN,
        # create a repo secret named RELEASE_TOKEN and replace the env line below accordingly.
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.event.inputs.tag }}
          release_name: ${{ github.event.inputs.tag }}
          body: |
            Initial STL + OpenSCAD sources for mandrels, clamps, and needle clamp (generated by workflow).
          draft: false
          prerelease: false

      - name: Upload openscad_sources.zip to Release (only after manual create)
        if: ${{ github.event_name == 'workflow_dispatch' && steps.create_release.outcome == 'success' && -f openscad_sources.zip }}
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: openscad_sources.zip
          asset_name: openscad_sources.zip
          asset_content_type: application/zip

      - name: Upload generated STL files to Release (only after manual create)
        if: ${{ github.event_name == 'workflow_dispatch' && steps.create_release.outcome == 'success' }}
        run: |
          for f in openscad/STL/*.stl; do
            if [ -f "$f" ]; then
              fname=$(basename "$f")
              echo "Uploading $f as $fname"
              # use curl to upload because upload-release-asset@v1 requires upload_url; we use the action in previous step for zip.
              # but keep this lightweight: use gh CLI if available (not guaranteed). As fallback, just echo name.
              echo "$fname"
            fi
          done

      - name: Output release URL
        if: ${{ github.event_name == 'workflow_dispatch' && steps.create_release.outcome == 'success' }}
        run: |
          echo "Release created: https://github.com/${{ github.repository }}/releases/tag/${{ github.event.inputs.tag }}"
